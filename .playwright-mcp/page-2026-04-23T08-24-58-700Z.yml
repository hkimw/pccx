            - heading "pccx v002 Architecture" [level=1] [ref=e166]
            - paragraph [ref=e167]: Parallel Compute Core eXecutor — Second Generation
            - paragraph [ref=e168]:
              - strong [ref=e169]: pccx v002
              - text: is the second generation of a heterogeneous NPU architecture designed to accelerate
              - strong [ref=e170]: autoregressive decoding
              - text: "of Transformer-based large language models (LLMs) on edge devices. It takes a hard look at the GEMM-centric v001 design and restructures the data path around a single shared activation bus: GEMV, CVO, and GEMM now pull activations from the same L2 cache, which sits at the geometric center of the floorplan. The result is"
              - strong [ref=e171]: shorter, more regular data movement
              - text: across every compute path.
